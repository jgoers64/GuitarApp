name: Tuner CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - fix/tuner-string-matching

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tuner tests
        run: npm test

      - name: Build app
        run: npm run build
